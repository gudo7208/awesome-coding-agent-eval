name: Link Check

on:
  schedule:
    - cron: '17 3 * * 3'  # Wednesday 03:17 UTC
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress 'data/*.json' 'docs/*.md' 'README.md'
          fail: false

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-check-report
          path: lychee/out.md
          retention-days: 7
