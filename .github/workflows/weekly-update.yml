name: Weekly Update

on:
  schedule:
    - cron: '23 1 * * 1'  # Monday 01:23 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Run collection pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/collect/run_all.py --skip-llm

      - name: Upload candidates
        uses: actions/upload-artifact@v4
        with:
          name: candidates-${{ github.run_id }}
          path: candidates/
          retention-days: 14

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Validate existing data
        run: python scripts/process/validate.py

  update-stars:
    runs-on: ubuntu-latest
    if: github.event.schedule != '' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update star counts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/process/update_stars.py

      - name: Regenerate
        run: |
          python scripts/generate/generate_stats.py
          python scripts/generate/generate_docs.py
          python scripts/generate/generate_readme.py

      - name: Create PR if changed
        run: |
          if [ -z "$(git diff --name-only)" ]; then
            echo "No changes"
            exit 0
          fi
          BRANCH="auto/weekly-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: weekly star update $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create \
            --title "Weekly Update $(date +%Y-%m-%d)" \
            --body "Automated weekly update: star counts refreshed, docs regenerated." \
            --base main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
