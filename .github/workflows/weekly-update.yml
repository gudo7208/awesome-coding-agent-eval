name: Weekly Star Update

on:
  schedule:
    - cron: '23 1 * * 1'  # Monday 01:23 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Update star counts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/process/update_stars.py

      - name: Regenerate outputs
        run: |
          python scripts/generate/generate_stats.py
          python scripts/generate/generate_readme.py
          python scripts/generate/generate_llms_txt.py
          python scripts/generate/generate_docs.py

      - name: Create PR if changed
        run: |
          if [ -z "$(git diff --name-only)" ]; then
            echo "No changes"
            exit 0
          fi
          BRANCH="auto/weekly-stars-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: weekly star update $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create \
            --title "⭐ Weekly Star Update $(date +%Y-%m-%d)" \
            --body "Automated weekly update: star counts refreshed, docs regenerated." \
            --base main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
